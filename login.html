<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inventario ABC — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#e6edf3}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:40px 36px;width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{font-size:36px;margin-bottom:12px}
.logo-title{font-size:22px;font-weight:600}
.logo-sub{font-size:13px;color:#8b949e;margin-top:4px}
label{display:block;font-size:12px;color:#8b949e;margin-bottom:6px;margin-top:20px}
input{width:100%;padding:10px 14px;background:#0d1117;border:1px solid #30363d;
  border-radius:8px;color:#e6edf3;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:#d4a853}
.btn{width:100%;margin-top:24px;padding:12px;background:#d4a853;border:none;
  border-radius:8px;color:#0d1117;font-weight:700;font-size:15px;cursor:pointer}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{margin-top:16px;padding:10px 14px;background:rgba(248,81,73,.15);
  border:1px solid rgba(248,81,73,.4);border-radius:8px;color:#f85149;font-size:13px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📦</div>
    <div class="logo-title">Inventario Dashboard</div>
    <div class="logo-sub">Sistema de Control ABC · Distribuidoras</div>
  </div>
  <label>Correo electrónico</label>
  <input type="email" id="email" placeholder="usuario@empresa.com" autocomplete="email">
  <label>Contraseña</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  <div class="error" id="err"></div>
  <button class="btn" id="btn">Iniciar sesión</button>

  <!-- Recovery section — shown after 3 failed attempts -->
  <div id="recover-section" style="display:none;margin-top:20px;padding:16px;
    background:rgba(212,168,83,.08);border:1px solid rgba(212,168,83,.3);border-radius:8px;">
    <div style="font-size:13px;color:#d4a853;font-weight:600;margin-bottom:10px;">
      ¿Olvidaste tu contraseña?
    </div>
    <div style="font-size:12px;color:#8b949e;margin-bottom:10px;">
      Te enviaremos un enlace para restablecerla.
    </div>
    <input type="email" id="recover-email" placeholder="Confirma tu correo"
      style="width:100%;padding:9px 12px;background:#0d1117;border:1px solid #30363d;
        border-radius:7px;color:#e6edf3;font-size:13px;outline:none;margin-bottom:8px;">
    <button id="recover-btn" onclick="sendRecovery()"
      style="width:100%;padding:9px;background:transparent;border:1px solid #d4a853;
        border-radius:7px;color:#d4a853;font-size:13px;font-weight:600;cursor:pointer;">
      Enviar enlace de recuperación
    </button>
    <div id="recover-msg" style="font-size:12px;margin-top:8px;"></div>
  </div>
</div>
<script>
const SUPA_URL = 'https://ossebtealjsyeqxtrpto.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zc2VidGVhbGpzeWVxeHRycHRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjY0NjcsImV4cCI6MjA4OTYwMjQ2N30.60EIVGmG4jorBGnGBK8tE9NYx6G9NbTU_oZXMyHn1wc';

const sb = supabase.createClient(SUPA_URL, SUPA_KEY, {
  auth: { persistSession: true, storageKey: 'inv-auth', storage: window.localStorage }
});

// Si ya hay sesión → dashboard
// Si llega con token de recuperación, redirigir a reset.html
if (window.location.hash.includes('type=recovery') || window.location.hash.includes('access_token')) {
  window.location.href = 'reset.html' + window.location.hash;
}

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'dashboard.html';
});

const emailEl = document.getElementById('email');
const passEl  = document.getElementById('password');
const btnEl   = document.getElementById('btn');
const errEl   = document.getElementById('err');

var _loginAttempts = 0;

async function doLogin() {
  const email = emailEl.value.trim();
  const pass  = passEl.value;
  if (!email || !pass) { showErr('Completa todos los campos'); return; }
  btnEl.disabled = true;
  btnEl.textContent = 'Iniciando sesión…';
  errEl.style.display = 'none';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    _loginAttempts++;
    btnEl.disabled = false;
    btnEl.textContent = 'Iniciar sesión';
    if (_loginAttempts >= 3) {
      showErr('Credenciales incorrectas.');
      document.getElementById('recover-section').style.display = 'block';
      document.getElementById('recover-email').value = email;
    } else {
      var left = 3 - _loginAttempts;
      showErr('Credenciales incorrectas. ' + left + ' intento' + (left===1?'':'s') + ' restante' + (left===1?'':'s') + '.');
    }
  } else {
    await new Promise(r => setTimeout(r, 1000));
    window.location.href = 'dashboard.html';
  }
}

async function sendRecovery() {
  var email = document.getElementById('recover-email').value.trim();
  var btn   = document.getElementById('recover-btn');
  if (!email) return;
  btn.disabled = true; btn.textContent = 'Enviando…';
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + window.location.pathname.replace('login.html','reset.html'),
  });
  if (error) {
    document.getElementById('recover-msg').textContent = 'Error: ' + error.message;
    document.getElementById('recover-msg').style.color = '#f85149';
    btn.disabled = false; btn.textContent = 'Enviar enlace de recuperación';
  } else {
    document.getElementById('recover-msg').textContent = '✓ Enlace enviado a ' + email + '. Revisa tu correo.';
    document.getElementById('recover-msg').style.color = '#3fb950';
    btn.textContent = 'Enviado ✓';
  }
}
function showErr(m) { errEl.textContent = m; errEl.style.display = 'block'; }
btnEl.addEventListener('click', doLogin);
[emailEl, passEl].forEach(el => el.addEventListener('keydown', e => e.key==='Enter' && doLogin()));
</script>
</body>
</html>
